<section class="mt-4 px-4">
  <div class="mx-auto w-full max-w-xl">
    <div
      class="flex w-full items-center rounded-2xl border border-amber-500/30 bg-white shadow-md overflow-hidden focus-within:ring-2 focus-within:ring-amber-500/20"
    >
      <i class="fa-solid fa-magnifying-glass px-4 text-amber-500"></i>

      <input
        type="text"
        class="w-full bg-transparent px-1 py-3 text-neutral-800 placeholder:text-slate-400 focus:outline-none"
        [placeholder]="placeholder()"
        autofocus
        #txtSearch
        (keyup.enter)="value.emit(txtSearch.value)"
      />

      <button
        class="h-full bg-amber-500 px-4 py-3 font-semibold text-white transition-all duration-300 hover:bg-amber-600 sm:px-6"
        (click)="value.emit(txtSearch.value)"
      >
        <span class="hidden sm:inline">Buscar</span>
        <i class="fa-solid fa-arrow-right sm:hidden"></i>
      </button>
    </div>
  </div>
</section>
