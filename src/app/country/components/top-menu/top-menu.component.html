<nav class="w-full px-4 py-4">
  <div class="flex justify-center">
    <ul
      class="menu menu-horizontal w-full max-w-fit gap-2 overflow-x-auto rounded-box border bg-gray-800 p-2 text-slate-200 shadow-lg backdrop-blur-sm sm:p-3">
      @for (item of menuItems; track item.label) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="!bg-amber-500 !text-white"
            [routerLinkActiveOptions]="{ exact: true }"
            class="rounded-md !text-slate-200 transition-all duration-300 hover:!bg-amber-500 hover:!text-white font-semibold flex items-center justify-center gap-2 px-3 py-2 sm:px-4"
            [attr.aria-label]="item.label"
            [title]="item.label"
          >
            <i [class]="item.icon" class="text-lg"></i>
            <span class="hidden md:inline">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
