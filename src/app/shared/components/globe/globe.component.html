<div
  class="relative flex items-center justify-center select-none"
  [class.no-anim]="!animated"
  [style.width.px]="size * 1.85"
  [style.height.px]="size * 1.85">

  <!-- Anillos de radar -->
  @if (showRadar) {
    <div class="ring-pulse-1 absolute rounded-full border border-amber-400/60"
         [style.width.px]="size * 0.85"
         [style.height.px]="size * 0.85"></div>
    <div class="ring-pulse-2 absolute rounded-full border border-amber-400/50"
         [style.width.px]="size * 0.85"
         [style.height.px]="size * 0.85"></div>
    <div class="ring-pulse-3 absolute rounded-full border border-amber-400/40"
         [style.width.px]="size * 0.85"
         [style.height.px]="size * 0.85"></div>
  }

  <!-- Anillo exterior giratorio -->
  <svg class="ring-spin absolute"
       [attr.width]="size * 1.46"
       [attr.height]="size * 1.46"
       viewBox="0 0 190 190">
    <circle cx="95" cy="95" r="90" fill="none"
            stroke="#F59E0B" stroke-width="1.5"
            stroke-dasharray="8 12" opacity="0.35"/>
  </svg>

  <!-- Globo -->
  <div class="globe-float relative z-10">
    <svg viewBox="0 0 120 120"
         [attr.width]="size"
         [attr.height]="size">
      <!-- Sombra -->
      <ellipse cx="60" cy="114" rx="36" ry="5" fill="#94A3B8" opacity="0.18"/>
      <!-- Océano -->
      <circle cx="60" cy="58" r="50" fill="#DBEAFE"/>
      <!-- Latitudes -->
      <ellipse cx="60" cy="40" rx="50" ry="14" fill="none" stroke="#93C5FD" stroke-width="0.7" opacity="0.5"/>
      <ellipse cx="60" cy="58" rx="50" ry="22" fill="none" stroke="#93C5FD" stroke-width="0.7" opacity="0.5"/>
      <ellipse cx="60" cy="76" rx="50" ry="14" fill="none" stroke="#93C5FD" stroke-width="0.7" opacity="0.5"/>
      <!-- Ecuador -->
      <line x1="10" y1="58" x2="110" y2="58" stroke="#93C5FD" stroke-width="0.7" opacity="0.6"/>
      <!-- Meridianos -->
      <ellipse cx="60" cy="58" rx="20" ry="50" fill="none" stroke="#93C5FD" stroke-width="0.7" opacity="0.4"/>
      <ellipse cx="60" cy="58" rx="42" ry="50" fill="none" stroke="#93C5FD" stroke-width="0.7" opacity="0.4"/>
      <!-- Continentes -->
      <path d="M24 36 Q34 28 42 36 Q46 44 38 52 Q30 56 24 48 Z" fill="#4ADE80" opacity="0.75"/>
      <path d="M52 22 Q66 16 76 28 Q82 40 74 50 Q64 56 56 46 Q46 36 52 22 Z" fill="#4ADE80" opacity="0.75"/>
      <path d="M26 62 Q36 58 40 68 Q40 78 32 80 Q24 78 22 70 Z" fill="#4ADE80" opacity="0.7"/>
      <path d="M66 64 Q76 60 82 70 Q82 80 74 82 Q66 80 64 72 Z" fill="#4ADE80" opacity="0.7"/>
      <circle cx="52" cy="82" r="4" fill="#4ADE80" opacity="0.65"/>
      <!-- Borde -->
      <circle cx="60" cy="58" r="50" fill="none" stroke="#93C5FD" stroke-width="2"/>
      <!-- Reflejo -->
      <ellipse cx="44" cy="42" rx="15" ry="10" fill="white" opacity="0.18"
               transform="rotate(-20 44 42)"/>
      <!-- Símbolo central -->
      @if (symbol) {
        <text x="60" y="68" text-anchor="middle"
              font-size="32" font-weight="900"
              fill="#F59E0B" font-family="system-ui,sans-serif"
              opacity="0.92">{{ symbol }}</text>
      }
    </svg>
  </div>

  <!-- Pines flotantes -->
  @if (showPins) {
    <div class="pin-drift-a absolute" style="top:22px;left:24px">
      <svg width="18" height="24" viewBox="0 0 18 24">
        <path d="M9 0C4 0 0 4 0 9 0 15.75 9 24 9 24S18 15.75 18 9C18 4 14 0 9 0Z" fill="#F87171"/>
        <circle cx="9" cy="9" r="3.5" fill="white" opacity="0.75"/>
      </svg>
    </div>
    <div class="pin-drift-b absolute" style="top:38px;right:22px">
      <svg width="14" height="19" viewBox="0 0 18 24">
        <path d="M9 0C4 0 0 4 0 9 0 15.75 9 24 9 24S18 15.75 18 9C18 4 14 0 9 0Z" fill="#94A3B8"/>
        <circle cx="9" cy="9" r="3.5" fill="white" opacity="0.75"/>
      </svg>
    </div>
    <div class="pin-drift-c absolute" style="bottom:30px;right:30px">
      <svg width="16" height="21" viewBox="0 0 18 24">
        <path d="M9 0C4 0 0 4 0 9 0 15.75 9 24 9 24S18 15.75 18 9C18 4 14 0 9 0Z" fill="#FBBF24"/>
        <circle cx="9" cy="9" r="3.5" fill="white" opacity="0.75"/>
      </svg>
    </div>
  }

</div>
